appId: io.github.qwell.wiiu-vault
productName: Wii U Vault

electronVersion: 42.0.1
npmRebuild: true
beforeBuild: ./electron/before-build.cjs

directories:
    output: ../release

files:
    - main.js
    - preload.js
    - package.json
    - server/**
    - client/**
    - titles/**

asar: true

win:
    target:
        - target: zip
          arch:
              - x64

linux:
    target:
        - target: zip
          arch:
              - x64
