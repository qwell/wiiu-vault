<!doctype html>
<html lang="en">
    <head>
        <title>WiiU Vault</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />

        <link href="/assets/index.css" rel="stylesheet" />

        <link
            rel="icon"
            href="/assets/logo-64x64.png"
            type="image/png"
            sizes="64x64"
        />
        <!-- this is fucking stupid, follow specs, Apple -->
        <link
            rel="apple-touch-icon"
            href="/assets/logo-64x64.png"
            sizes="64x64"
        />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap"
            rel="stylesheet"
        />

        <script
            src="https://kit.fontawesome.com/436cc24d87.js"
            crossorigin="anonymous"
        ></script>
    </head>
    <body>
        <header>
            <img class="logo" src="/assets/logo-64x64.png" />
            <h1>WiiU Vault</h1>

            <button id="theme-toggle" type="button" aria-label="Toggle theme">
                <img
                    id="theme-icon-light"
                    src="/assets/light-mode-64x64.png"
                    alt=""
                    width="24"
                    height="24"
                />
                <img
                    id="theme-icon-dark"
                    src="/assets/dark-mode-64x64.png"
                    alt=""
                    width="24"
                    height="24"
                />
            </button>
        </header>

        <div id="output">Waiting...</div>

        <div
            id="server-status-modal"
            class="server-status-modal"
            role="alertdialog"
            aria-modal="true"
            aria-labelledby="server-status-title"
            aria-describedby="server-status-message"
            hidden
        >
            <div class="server-status-modal-card">
                <h2 id="server-status-title">Server connection lost</h2>
                <p id="server-status-message">
                    WiiU Vault can no longer reach the local server. This
                    message will close automatically if the server starts
                    responding again.
                </p>
            </div>
        </div>

        <script type="module" src="./main.ts"></script>
        <footer>
            <div>
                WiiU Vault <span id="app-version"></span> |
                <a
                    href="https://github.com/qwell/wiiu-vault"
                    rel="noopener"
                    target="_blank"
                    >Source Code</a
                >
            </div>
            <div>
                Created by Jason Parker --
                <a href="https://ꩰ.com/@north" rel="noopener" target="_blank"
                    >@north@ꩰ.com</a
                >
                <i class="fa-solid fa-xs fa-up-right-from-square"></i>
            </div>
        </footer>
    </body>
</html>
